services:
  wiremock:
    # image can be overridden to use an immutable image (e.g. ghcr.io/<owner>/qapirag-jira-mock:1.0.0)
    image: ${WIREMOCK_IMAGE:-wiremock/wiremock:3.3.1}
    container_name: qapirag-jira-mock
    ports:
      - "8092:8080"
    # In development we mount mappings/__files for fast iteration.
    # In production set WIREMOCK_IMAGE to a built image containing mappings to avoid mounts.
    volumes:
      - ./mappings:/home/wiremock/mappings:ro
      - ./__files:/home/wiremock/__files:ro
    command: --verbose
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/__admin/mappings || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3



