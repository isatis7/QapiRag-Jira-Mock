name: qapirag-jira-mock

networks:
  qapirag-jira-mock-net:
    driver: bridge

services:
  wiremock:
    image: wiremock/wiremock:3.3.1
    container_name: qapirag-jira-mock
    ports:
      - "8092:8080"
    volumes:
      - ./mappings:/home/wiremock/mappings:ro
      - ./__files:/home/wiremock/__files:ro
    command: --verbose
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/__admin/mappings || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - qapirag-jira-mock-net
  mcp:
    build: ./mcp
    container_name: qapirag-mcp
    depends_on:
      - wiremock
    environment:
      - WIREMOCK_HOST=wiremock
      - WIREMOCK_PORT=8080
      - MCP_ENFORCE_AUTH=false
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - qapirag-jira-mock-net

